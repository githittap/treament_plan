<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>치과 소식 · 아산정플란트치과</title>
<meta name="description" content="치과 뉴스, 치과 건강보험, 의료 판결 소식을 한눈에.">
<style>
  :root{
    --bg:#070c0e; --ink:#e8f6f4; --gray:#8fb2ae;
    --mint:#2fd9c4; --mint-2:#5fe6d6; --line:rgba(90,210,200,0.18);
    --glass:rgba(20,34,36,0.55);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:
      radial-gradient(1100px 720px at 82% -10%, rgba(47,217,196,0.16) 0%, rgba(47,217,196,0) 55%),
      radial-gradient(900px 640px at 4% 112%, rgba(29,110,107,0.22) 0%, rgba(29,110,107,0) 60%),
      var(--bg);
    background-attachment:fixed; color:var(--ink); min-height:100vh;
    padding:28px 18px 60px;
  }
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:rgba(90,210,200,0.25);border-radius:8px;}
  a{color:inherit;}
  .wrap{max-width:820px;margin:0 auto;}

  .topbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;
    animation:riseIn .6s cubic-bezier(.22,.9,.32,1) both;}
  .back{text-decoration:none;font-size:13px;font-weight:700;color:var(--mint-2);
    background:rgba(47,217,196,0.08);border:1px solid var(--line);border-radius:10px;padding:8px 14px;
    transition:background .16s,transform .16s;}
  .back:hover{background:rgba(47,217,196,0.16);transform:translateX(-2px);}
  .topbar h1{font-size:22px;font-weight:800;margin:0;letter-spacing:-0.3px;}
  .topbar .em{font-size:24px;}

  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;
    animation:riseIn .6s .06s cubic-bezier(.22,.9,.32,1) both;}
  .tab{
    flex:1 1 auto;padding:11px 14px;border-radius:12px;font-size:13.5px;font-weight:700;cursor:pointer;
    background:var(--glass);border:1px solid var(--line);color:var(--ink);
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    transition:all .16s;white-space:nowrap;
  }
  .tab .sub{display:block;font-size:11px;font-weight:500;color:var(--gray);margin-top:2px;}
  .tab.on{background:linear-gradient(135deg,#2fd9c4,#1fb8a8);color:#062421;border-color:var(--mint);
    box-shadow:0 0 18px rgba(47,217,196,0.35);}
  .tab.on .sub{color:rgba(6,36,33,0.7);}

  .list{display:flex;flex-direction:column;gap:12px;min-height:200px;}
  .news{
    display:block;text-decoration:none;
    background:var(--glass);border:1px solid var(--line);border-radius:14px;padding:16px 18px;
    backdrop-filter:blur(14px) saturate(1.2);-webkit-backdrop-filter:blur(14px) saturate(1.2);
    box-shadow:0 8px 28px rgba(0,0,0,0.34);
    transition:transform .18s,border-color .18s,box-shadow .18s;
    animation:riseIn .5s cubic-bezier(.22,.9,.32,1) both;
  }
  .news:hover{transform:translateY(-3px);border-color:rgba(47,217,196,0.4);
    box-shadow:0 14px 40px rgba(0,0,0,0.45),0 0 22px rgba(47,217,196,0.12);}
  .news .nt{font-size:15px;font-weight:700;line-height:1.5;margin:0 0 8px;color:var(--ink);}
  .news .meta{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--gray);}
  .news .src{color:var(--mint-2);font-weight:700;}
  .news .dot{opacity:.5;}

  .state{text-align:center;color:var(--gray);font-size:13.5px;padding:40px 20px;line-height:1.8;}
  .state .retry{display:inline-block;margin-top:12px;color:#062421;font-weight:700;
    background:linear-gradient(135deg,#2fd9c4,#1fb8a8);padding:8px 16px;border-radius:10px;cursor:pointer;
    border:none;font-size:13px;}
  .spinner{width:26px;height:26px;border:3px solid rgba(47,217,196,0.25);border-top-color:var(--mint);
    border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .foot{margin-top:24px;font-size:11.5px;color:rgba(143,178,174,0.6);text-align:center;line-height:1.7;}

  @keyframes riseIn{from{opacity:0;transform:translateY(16px) scale(.985);}
    to{opacity:1;transform:translateY(0) scale(1);}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
  @media (max-width:560px){.topbar h1{font-size:18px;} .tab{flex:1 1 100%;}}
</style>
</head>
<body>
<div class="wrap">

  <div class="topbar">
    <a class="back" href="index.html">← 홈</a>
    <span class="em">📰</span>
    <h1>치과 소식</h1>
  </div>

  <div class="tabs" id="tabs">
    <button class="tab on" data-cat="dental">치과 뉴스<span class="sub">치의신보 등 최신</span></button>
    <button class="tab" data-cat="insurance">치과 건강보험<span class="sub">보험·수가 소식</span></button>
    <button class="tab" data-cat="law">의료 판결·소송<span class="sub">최근 판례 위주</span></button>
  </div>

  <div class="list" id="list"></div>

  <div class="foot">
    출처: Google 뉴스 검색 결과 · 제목을 누르면 원문으로 이동합니다.<br>
    소식은 자동 수집되며, 아산정플란트치과의 공식 입장이 아닙니다.
  </div>
</div>

<script>
(function(){
  'use strict';
  var QUERIES={
    dental:'치과',
    insurance:'치과 건강보험 OR 치과 보험 OR 치과 수가',
    law:'치과 판결 OR 치과 소송 OR 의료 판결 OR 의료소송'
  };
  // CORS 우회 프록시 (공개 뉴스 RSS 전용, 개인정보 미포함)
  var PROXIES=[
    function(u){return 'https://api.allorigins.win/raw?url='+encodeURIComponent(u);},
    function(u){return 'https://corsproxy.io/?url='+encodeURIComponent(u);}
  ];
  var cache={};
  var listEl=document.getElementById('list');
  var current='dental';

  function rssUrl(cat){
    var q=encodeURIComponent(QUERIES[cat]);
    return 'https://news.google.com/rss/search?q='+q+'&hl=ko&gl=KR&ceid=KR:ko';
  }
  function timeAgo(dateStr){
    var d=new Date(dateStr); if(isNaN(d)) return '';
    var s=Math.floor((Date.now()-d.getTime())/1000);
    if(s<3600) return Math.max(1,Math.floor(s/60))+'분 전';
    if(s<86400) return Math.floor(s/3600)+'시간 전';
    if(s<86400*7) return Math.floor(s/86400)+'일 전';
    return (d.getMonth()+1)+'월 '+d.getDate()+'일';
  }
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}

  function loading(){listEl.innerHTML='<div class="state"><div class="spinner"></div>소식을 불러오는 중…</div>';}
  function errorState(){
    listEl.innerHTML='<div class="state">소식을 불러오지 못했습니다.<br>네트워크 상태를 확인한 뒤 다시 시도해 주세요.'
      +'<br><button class="retry" id="retry">다시 시도</button></div>';
    document.getElementById('retry').addEventListener('click',function(){cache[current]=null;load(current);});
  }

  function parseRss(xmlText){
    var doc=new DOMParser().parseFromString(xmlText,'text/xml');
    var items=doc.querySelectorAll('item');
    var out=[];
    items.forEach(function(it){
      var title=(it.querySelector('title')||{}).textContent||'';
      var link=(it.querySelector('link')||{}).textContent||'';
      var pub=(it.querySelector('pubDate')||{}).textContent||'';
      var srcEl=it.getElementsByTagName('source')[0];
      var src=srcEl?srcEl.textContent:'';
      // Google 뉴스 제목은 "제목 - 언론사" 형식 → 언론사 분리
      if(!src){var m=title.lastIndexOf(' - ');if(m>0){src=title.slice(m+3);title=title.slice(0,m);}}
      else{var m2=title.lastIndexOf(' - '+src);if(m2>0)title=title.slice(0,m2);}
      out.push({title:title,link:link,pub:pub,src:src});
    });
    return out;
  }

  function render(items){
    if(!items.length){listEl.innerHTML='<div class="state">표시할 소식이 없습니다.</div>';return;}
    var html='';
    items.slice(0,20).forEach(function(n,i){
      html+='<a class="news" href="'+esc(n.link)+'" target="_blank" rel="noopener noreferrer" style="animation-delay:'+(i*0.03)+'s">'
        +'<div class="nt">'+esc(n.title)+'</div>'
        +'<div class="meta">'+(n.src?'<span class="src">'+esc(n.src)+'</span><span class="dot">·</span>':'')
        +'<span>'+esc(timeAgo(n.pub))+'</span></div></a>';
    });
    listEl.innerHTML=html;
  }

  function fetchWithProxies(url,pi){
    pi=pi||0;
    if(pi>=PROXIES.length) return Promise.reject('all proxies failed');
    return fetch(PROXIES[pi](url)).then(function(r){
      if(!r.ok) throw new Error('http '+r.status); return r.text();
    }).catch(function(){ return fetchWithProxies(url,pi+1); });
  }

  // 1순위: 같은 출처 서버리스 함수(/news) → CORS 없음, 캐시됨 (Cloudflare 배포 시)
  // 2순위: 공개 프록시 (로컬/GitHub Pages 테스트용 대비)
  function fetchNews(cat){
    return fetch('news?cat='+encodeURIComponent(cat)).then(function(r){
      if(!r.ok) throw new Error('fn http '+r.status);
      return r.text();
    }).then(function(txt){
      var items=parseRss(txt);
      if(!items.length) throw new Error('empty');
      return items;
    }).catch(function(){
      return fetchWithProxies(rssUrl(cat)).then(function(txt){return parseRss(txt);});
    });
  }

  function load(cat){
    current=cat;
    if(cache[cat]){render(cache[cat]);return;}
    loading();
    fetchNews(cat).then(function(items){
      if(!items.length) throw new Error('empty');
      cache[cat]=items;
      if(current===cat) render(items);
    }).catch(function(){ if(current===cat) errorState(); });
  }

  document.getElementById('tabs').addEventListener('click',function(e){
    var b=e.target.closest('.tab'); if(!b) return;
    document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('on');});
    b.classList.add('on');
    load(b.dataset.cat);
  });

  load('dental');
})();
</script>
</body>
</html>
